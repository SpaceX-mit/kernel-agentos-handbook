<!-- @dsCard group="Type" viewport="700x250" name="Type scale" subtitle="Major Third (1.25) · body = 20px" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--rubin-ivory); color: var(--rubin-slate); font-family: var(--font-serif); }
  .wrap { padding: 22px 32px; }
  .line { display: flex; align-items: baseline; gap: 18px; border-bottom: 1px solid var(--rubin-ivory-dark); padding: 7px 0; }
  .line:last-child { border-bottom: 0; }
  .tok { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.06em; color: var(--rubin-slate-muted); width: 130px; flex: none; }
  .samp { line-height: 1; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="line"><span class="tok">--text-2xl · 48.8</span><span class="samp" style="font-size:var(--text-2xl)">Hero</span></div>
    <div class="line"><span class="tok">--text-xl · 39.1</span><span class="samp" style="font-size:var(--text-xl)">Page title</span></div>
    <div class="line"><span class="tok">--text-lg · 31.3</span><span class="samp" style="font-size:var(--text-lg)">Section title</span></div>
    <div class="line"><span class="tok">--text-md · 25</span><span class="samp" style="font-size:var(--text-md)">Subheading</span></div>
    <div class="line"><span class="tok">--text-base · 20</span><span class="samp" style="font-size:var(--text-base)">Body prose</span></div>
    <div class="line"><span class="tok">--text-sm · 16</span><span class="samp" style="font-size:var(--text-sm)">Caption / meta</span></div>
    <div class="line"><span class="tok">--text-xs · 12.8</span><span class="samp" style="font-size:var(--text-xs);font-family:var(--font-mono);letter-spacing:0.1em">FINE PRINT · KICKER</span></div>
  </div>
</body>
</html>
