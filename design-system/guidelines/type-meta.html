<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--rubin-ivory); color: var(--rubin-slate); }
  .wrap { padding: 26px 32px; display: flex; flex-direction: column; gap: 16px; }
  .row { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
  .spec { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.06em; color: var(--rubin-slate-muted); }
</style>
</head>
<body>
  <div class="wrap">
    <div class="row">
      <span class="pop-kicker">CONTENTS · 目次</span>
      <span class="pop-kicker pop-kicker--tomato">FEATURE · 360</span>
    </div>
    <div class="row">
      <span class="pop-banner">MAGAZINE FOR CITY CODERS</span>
      <span class="pop-banner pop-banner--kraft">SECURITY</span>
      <span class="pop-price">¥0 · BYOK</span>
    </div>
    <div class="row">
      <span class="pop-folio">ISSUE 360 · APRIL 2026</span>
      <span class="pop-catalog-num">001.</span>
      <span class="pop-hash">open-source</span>
    </div>
    <div class="spec">Courier Prime · 400 / 700 · uppercase · tracking +0.14em (caps) · tabular-nums on figures</div>
  </div>
</body>
</html>
