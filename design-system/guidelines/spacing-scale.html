<!-- @dsCard group="Spacing" viewport="700x150" name="Spacing scale" subtitle="4 → 64px · the rhythm both products share" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--rubin-ivory); font-family: var(--font-mono); }
  .wrap { display: flex; align-items: flex-end; gap: 16px; padding: 24px 28px; }
  .col { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .bar { background: var(--rubin-primary); width: 22px; border-radius: 2px 2px 0 0; }
  .n { font-size: 10px; color: var(--rubin-slate-muted); letter-spacing: 0.04em; }
  .v { font-size: 10px; color: var(--rubin-slate); font-weight: 700; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="col"><div class="bar" style="height:4px"></div><div class="v">4</div><div class="n">xs</div></div>
    <div class="col"><div class="bar" style="height:8px"></div><div class="v">8</div><div class="n">sm</div></div>
    <div class="col"><div class="bar" style="height:12px"></div><div class="v">12</div><div class="n">md</div></div>
    <div class="col"><div class="bar" style="height:16px"></div><div class="v">16</div><div class="n">lg</div></div>
    <div class="col"><div class="bar" style="height:24px"></div><div class="v">24</div><div class="n">xl</div></div>
    <div class="col"><div class="bar" style="height:32px"></div><div class="v">32</div><div class="n">2xl</div></div>
    <div class="col"><div class="bar" style="height:48px"></div><div class="v">48</div><div class="n">3xl</div></div>
    <div class="col"><div class="bar" style="height:64px"></div><div class="v">64</div><div class="n">4xl</div></div>
  </div>
</body>
</html>
