<!-- @dsCard group="Colors" viewport="700x170" name="Paper stocks" subtitle="Each warm ground signals an issue register" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--rubin-ivory); font-family: var(--font-mono); }
  .wrap { display: grid; grid-template-columns: repeat(6, 1fr); gap: 0; padding: 20px; }
  .step { height: 110px; display: flex; flex-direction: column; justify-content: flex-end; padding: 9px; border: 1px solid var(--pop-hairline-soft); border-right: 0; }
  .step:last-child { border-right: 1px solid var(--pop-hairline-soft); }
  .n { font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; font-weight: 700; }
  .sig { font-size: 9.5px; opacity: 0.7; margin-top: 2px; line-height: 1.3; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="step" style="background:var(--pop-cream)"><div class="n">cream</div><div class="sig">anchor · default</div></div>
    <div class="step" style="background:var(--pop-butter)"><div class="n">butter</div><div class="sig">summer · reading</div></div>
    <div class="step" style="background:var(--pop-kraft)"><div class="n">kraft</div><div class="sig">field · outdoor</div></div>
    <div class="step" style="background:var(--pop-ledger)"><div class="n">ledger</div><div class="sig">audit · graph-ruled</div></div>
    <div class="step" style="background:var(--pop-coffee);color:var(--pop-ivory)"><div class="n">coffee</div><div class="sig">secondary ink</div></div>
    <div class="step" style="background:var(--pop-ink);color:var(--pop-ivory)"><div class="n">ink</div><div class="sig">night · after-hours</div></div>
  </div>
</body>
</html>
