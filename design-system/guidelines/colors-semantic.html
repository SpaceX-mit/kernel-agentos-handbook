<!-- @dsCard group="Colors" viewport="700x130" name="Semantic" subtitle="Status colours, each on its 8% wash" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--rubin-ivory); font-family: var(--font-mono); }
  .wrap { display: flex; gap: 14px; padding: 20px; }
  .s { flex: 1; border-radius: var(--radius-sm); padding: 14px; display: flex; flex-direction: column; gap: 6px; }
  .row { display: flex; align-items: center; gap: 8px; }
  .dot { width: 12px; height: 12px; border-radius: var(--radius-full); }
  .n { font-size: 11px; letter-spacing: 0.06em; text-transform: uppercase; }
  .h { font-size: 10px; opacity: 0.75; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="s" style="background:var(--rubin-error-light)"><div class="row"><span class="dot" style="background:var(--rubin-error)"></span><span class="n" style="color:var(--rubin-error)">error</span></div><span class="h">#DC2626</span></div>
    <div class="s" style="background:var(--kernel-success-bg)"><div class="row"><span class="dot" style="background:var(--kernel-success)"></span><span class="n" style="color:var(--kernel-success)">success</span></div><span class="h">#16A34A</span></div>
    <div class="s" style="background:var(--kernel-warning-bg)"><div class="row"><span class="dot" style="background:var(--kernel-warning)"></span><span class="n" style="color:var(--kernel-warning)">warning</span></div><span class="h">#F59E0B</span></div>
    <div class="s" style="background:var(--kernel-info-bg)"><div class="row"><span class="dot" style="background:var(--kernel-info)"></span><span class="n" style="color:var(--kernel-info)">info</span></div><span class="h">#3B82F6</span></div>
  </div>
</body>
</html>
