<!-- @dsCard group="Type" viewport="700x230" name="Display — EB Garamond" subtitle="Headlines set tight & large. Italic carries emphasis → tomato." -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--pop-cream); color: var(--pop-ink); }
  .wrap { padding: 28px 32px; }
  .kick { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--pop-coffee); margin-bottom: 14px; }
  h1 { font-family: var(--font-serif); font-weight: 800; font-size: 84px; line-height: 0.82; letter-spacing: -0.06em; margin: 0; color: var(--pop-tomato); text-shadow: 2px 2px 0 var(--pop-coffee), -1px -1px 0 rgba(255,255,255,0.4); }
  .dot { color: var(--pop-ink); font-style: italic; }
  h2 { font-family: var(--font-serif); font-weight: 700; font-size: 40px; line-height: 0.98; letter-spacing: -0.03em; margin: 22px 0 0; }
  h2 em { font-style: italic; color: var(--pop-tomato); font-weight: 600; }
  .spec { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.06em; color: var(--pop-coffee); margin-top: 16px; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="kick">[ DISPLAY · 見出し ]</div>
    <h1>kernel<span class="dot">.</span>chat</h1>
    <h2>The <em>Urban Outdoors</em> Review</h2>
    <div class="spec">EB Garamond · 800 wordmark / 700 headline · tracking −0.06 to −0.03em · italic em → tomato</div>
  </div>
</body>
</html>
