<!-- @dsCard group="Brand" viewport="700x180" name="Iconography" subtitle="Editorial PopIcons (1.75px stroke). The asterisk ★ is the one system glyph. No emoji." -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--pop-cream); color: var(--pop-ink); font-family: var(--font-mono); }
  .wrap { display: flex; gap: 30px; padding: 22px 28px; align-items: center; }
  .glyph { display: flex; flex-direction: column; align-items: center; gap: 10px; flex: none; }
  .glyph svg { width: 40px; height: 40px; color: var(--pop-tomato); }
  .glyph .lab { font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--pop-coffee); }
  .div { width: 1px; align-self: stretch; background: var(--pop-hairline-soft); }
  .col { flex: 1; }
  .lab { font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--pop-coffee); margin-bottom: 14px; }
  .icons { display: flex; gap: 18px; flex-wrap: wrap; align-items: center; color: var(--pop-ink); }
  .icons svg { width: 24px; height: 24px; }
  .note { font-size: 10px; color: var(--pop-coffee); margin-top: 14px; line-height: 1.5; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="glyph">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round"><line x1="12" y1="3" x2="12" y2="21"/><line x1="4.1" y1="7.5" x2="19.9" y2="16.5"/><line x1="4.1" y1="16.5" x2="19.9" y2="7.5"/></svg>
      <span class="lab">★ system glyph</span>
    </div>
    <div class="div"></div>
    <div class="col">
      <div class="lab">Editorial · PopIcon · 1.75px stroke</div>
      <div class="icons">
        <!-- arrow -->
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="20" y2="12"/><polyline points="14 6 20 12 14 18"/></svg>
        <!-- sparkle -->
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3 L13.3 10.7 L21 12 L13.3 13.3 L12 21 L10.7 13.3 L3 12 L10.7 10.7 Z"/></svg>
        <!-- leaf -->
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M4 20 C4 10, 14 4, 20 4 C20 14, 14 20, 4 20 Z"/><line x1="5" y1="19" x2="14" y2="10"/></svg>
        <!-- coffee -->
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M5 9 H17 V16 C17 18.2 15.2 20 13 20 H9 C6.8 20 5 18.2 5 16 Z"/><path d="M17 11 H19 C20.1 11 21 11.9 21 13 C21 14.1 20.1 15 19 15 H17"/><line x1="8" y1="3" x2="8" y2="6"/><line x1="12" y1="3" x2="12" y2="6"/></svg>
        <!-- book -->
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4 H11 C12.1 4 13 4.9 13 6 V21 L11 19 H4 Z"/><path d="M20 4 H13 C11.9 4 11 4.9 11 6 V21 L13 19 H20 Z"/></svg>
        <!-- quote -->
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M6 17 C6 13 9 11 10 11 L10 8 C7 8 4 10 4 14 V17 Z"/><path d="M16 17 C16 13 19 11 20 11 L20 8 C17 8 14 10 14 14 V17 Z"/></svg>
        <!-- pilcrow -->
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M16 3 H10 C7.8 3 6 4.8 6 7 C6 9.2 7.8 11 10 11 H11 V21"/><line x1="15" y1="3" x2="15" y2="21"/></svg>
      </div>
      <div class="note">Thicker editorial stroke \u2014 deliberately not Feather/Lucide. Sparing: section markers &amp; sign-offs only. The asterisk ★ is the single systemwide mark (every folio strip). No emoji, ever.</div>
    </div>
  </div>
</body>
</html>
