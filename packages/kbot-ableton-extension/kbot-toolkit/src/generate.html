<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>kbot — Generate Pattern</title>
  <script>
    // Context is inlined by the extension before the dialog opens (host -> webview).
    const CTX = __KBOT_CTX__;

    const isWebKit = window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.live;
    const isWebView2 = window.chrome && window.chrome.webview;

    function send(message) {
      if (isWebKit) window.webkit.messageHandlers.live.postMessage(message);
      else if (isWebView2) window.chrome.webview.postMessage(message);
    }

    function closeWithResult(result) {
      send({ method: "close_and_send", params: [JSON.stringify(result)] });
    }

    function generate() {
      closeWithResult({
        ok: true,
        bars: Number(document.getElementById("bars").value),
        density: Number(document.getElementById("density").value) / 100,
        octave: Number(document.getElementById("octave").value),
        seed: Number(document.getElementById("seed").value),
      });
    }

    document.addEventListener("DOMContentLoaded", () => {
      const c = CTX || {};
      document.getElementById("scale").textContent = (c.scaleRoot ?? "C") + " " + (c.scaleName ?? "Major");
      if (c.last) {
        document.getElementById("bars").value = c.last.bars;
        document.getElementById("density").value = Math.round((c.last.density ?? 0.5) * 100);
        document.getElementById("octave").value = c.last.octave;
        document.getElementById("seed").value = c.last.seed;
      }
      const d = document.getElementById("density");
      const dv = document.getElementById("density-val");
      const sync = () => (dv.textContent = d.value + "%");
      d.addEventListener("input", sync);
      sync();
      document.addEventListener("keydown", (e) => {
        if (e.key === "Enter") generate();
        if (e.key === "Escape") closeWithResult({ ok: false });
      });
    });
  </script>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    * { margin: 0; }
    input, button { font: inherit; }
    :root {
      --bg: hsl(0, 0%, 21%);
      --control: hsl(0, 0%, 16%);
      --input: hsl(0, 0%, 12%);
      --text: hsl(0, 0%, 78%);
      --muted: hsl(0, 0%, 48%);
      --border: hsl(0, 0%, 7%);
      --accent: hsl(31, 100%, 67%);
    }
    html { background: var(--bg); color: var(--text); font-family: sans-serif; font-size: 12px; height: 100%; -webkit-font-smoothing: antialiased; }
    body { height: 100%; display: flex; flex-direction: column; gap: 0.9em; padding: 1.2em 1.4em; }
    h1 { font-size: 1.15rem; font-weight: 600; }
    .sub { color: var(--muted); }
    .scale { color: var(--accent); font-weight: 600; }
    .row { display: flex; align-items: center; justify-content: space-between; gap: 1em; }
    label { color: var(--text); }
    input[type="number"] { width: 84px; background: var(--input); color: var(--text); border: 1px solid var(--border); height: 22px; padding: 0 0.4em; }
    input[type="range"] { width: 150px; accent-color: var(--accent); }
    .buttons { display: flex; gap: 0.5em; justify-content: flex-end; margin-top: auto; }
    button { background: var(--control); color: var(--text); border: 1px solid var(--border); height: 24px; padding: 0 1.1em; border-radius: 12px; cursor: pointer; }
    button.primary { background: var(--accent); color: #111; font-weight: 600; }
    button:hover { filter: brightness(1.15); }
  </style>
</head>

<body>
  <div>
    <h1>Generate Pattern</h1>
    <div class="sub">In scale <span class="scale" id="scale">C Major</span> — written into the selected MIDI clip.</div>
  </div>
  <div class="row"><label for="bars">Bars</label><input type="number" id="bars" min="1" max="16" value="2" /></div>
  <div class="row"><label for="density">Density <span id="density-val" class="sub"></span></label><input type="range" id="density" min="5" max="100" value="45" /></div>
  <div class="row"><label for="octave">Octave</label><input type="number" id="octave" min="0" max="8" value="4" /></div>
  <div class="row"><label for="seed">Seed</label><input type="number" id="seed" min="0" max="999999" value="1" /></div>
  <div class="buttons">
    <button onclick='closeWithResult({ ok: false })'>Cancel</button>
    <button class="primary" onclick="generate()">Generate</button>
  </div>
</body>

</html>
